<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Detector - URL Parser</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 90vh;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            margin-bottom: 10px;
            font-size: 28px;
        }

        .header p {
            opacity: 0.9;
            font-size: 14px;
        }

        .content {
            display: flex;
            flex-direction: column;
            flex: 1;
            overflow: hidden;
        }

        .input-section {
            background: #f8f9fa;
            padding: 20px;
            border-bottom: 2px solid #e0e0e0;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .input-section h2 {
            font-size: 16px;
            color: #333;
        }

        .input-section label {
            display: block;
            font-size: 12px;
            color: #666;
        }

        textarea {
            width: 100%;
            height: 120px;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            resize: vertical;
        }

        textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .controls {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        .button-group {
            display: flex;
            gap: 8px;
        }

        button {
            padding: 12px 20px;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
        }

        .btn-process {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-process:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(102, 126, 234, 0.3);
        }

        .btn-process:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-stop {
            background: #d32f2f;
            color: white;
        }

        .btn-stop:hover:not(:disabled) {
            background: #b71c1c;
            transform: translateY(-2px);
        }

        .btn-stop:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .btn-clear {
            background: #f5f5f5;
            color: #333;
        }

        .btn-clear:hover {
            background: #efefef;
        }

        .stats {
            display: flex;
            gap: 20px;
            font-size: 13px;
            color: #666;
            flex-wrap: wrap;
        }

        .stats-item {
            background: white;
            padding: 8px 12px;
            border-radius: 4px;
            border-left: 3px solid #667eea;
        }

        .stats-item strong {
            color: #333;
        }

        .main-content {
            display: flex;
            flex: 1;
            overflow: hidden;
            gap: 16px;
            padding: 16px;
        }

        .display-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .display-panel h2 {
            font-size: 16px;
            margin-bottom: 12px;
            color: #333;
        }

        .page-viewer {
            flex: 1;
            background: white;
            border: 1px solid #ddd;
            border-radius: 6px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .page-viewer iframe {
            flex: 1;
            border: none;
            width: 100%;
        }

        .page-info {
            background: #f8f9fa;
            padding: 12px;
            border-top: 1px solid #ddd;
            font-size: 12px;
            color: #666;
            max-height: 100px;
            overflow-y: auto;
        }

        .page-info strong {
            color: #333;
        }

        .page-info-item {
            margin: 4px 0;
            word-break: break-all;
        }

        .pagination {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 12px;
            gap: 12px;
        }

        .pagination button {
            padding: 8px 16px;
            font-size: 13px;
            flex: 0 1 120px;
        }

        .pagination-info {
            text-align: center;
            font-size: 13px;
            color: #666;
            flex: 1;
        }

        .empty-state {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #999;
            text-align: center;
            flex-direction: column;
        }

        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: #666;
        }

        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .message {
            margin-top: 8px;
            padding: 12px;
            border-radius: 6px;
            font-size: 13px;
            max-height: 60px;
            overflow-y: auto;
        }

        .error-message {
            background: #fee;
            color: #c33;
            border-left: 4px solid #c33;
        }

        .success-message {
            background: #efe;
            color: #3c3;
            border-left: 4px solid #3c3;
        }

        .info-message {
            background: #eef;
            color: #33c;
            border-left: 4px solid #33c;
        }

        .debug-log {
            background: #f5f5f5;
            border: 1px solid #ddd;
            border-radius: 4px;
            padding: 8px;
            margin-top: 8px;
            font-size: 11px;
            font-family: monospace;
            max-height: 80px;
            overflow-y: auto;
            color: #666;
        }

        @media (max-width: 768px) {
            .container {
                height: auto;
            }

            textarea {
                height: 100px;
            }

            .controls {
                flex-direction: column;
            }

            .button-group {
                width: 100%;
            }

            .stats {
                flex-direction: column;
            }

            .main-content {
                flex-direction: column;
                padding: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🖼️ Image Detector</h1>
            <p>Parse URLs, detect image URLs in content, and display matching pages (up to 50 results)</p>
        </div>

        <div class="content">
            <div class="input-section">
                <h2>Input URLs</h2>
                <label>Paste your URL list (one per line). Supports plain URLs, hyperlinks, and web.archive.org links:</label>
                <textarea id="urlInput" placeholder="Paste URLs or hyperlinks here..."></textarea>

                <div class="controls">
                    <div class="button-group">
                        <button class="btn-process" id="processBtn" onclick="processUrls()">⚡ Process URLs</button>
                        <button class="btn-stop" id="stopBtn" onclick="stopProcessing()" disabled style="display:none;">⏹️ Stop</button>
                        <button class="btn-clear" onclick="clearInput()">🗑️ Clear</button>
                    </div>
                    <div class="stats">
                        <div class="stats-item"><strong>URLs:</strong> <span id="urlCount">0</span></div>
                        <div class="stats-item"><strong>Found:</strong> <span id="validCount">0</span></div>
                        <div class="stats-item"><strong>Failed:</strong> <span id="failedCount">0</span></div>
                        <div class="stats-item"><strong>Status:</strong> <span id="status">Ready</span></div>
                    </div>
                </div>

                <div id="message"></div>
                <div id="debugLog" class="debug-log" style="display:none;"></div>
            </div>

            <div class="main-content">
                <div class="display-panel">
                    <h2>Page Preview</h2>
                    <div class="page-viewer">
                        <iframe id="pageFrame" sandbox="allow-same-origin allow-scripts"></iframe>
                        <div class="page-info">
                            <div class="page-info-item"><strong>URL:</strong> <span id="pageUrl">-</span></div>
                            <div class="page-info-item"><strong>Images Found:</strong> <span id="imageCount">0</span></div>
                            <div class="page-info-item"><strong>Type:</strong> <span id="contentType">-</span></div>
                        </div>
                    </div>

                    <div class="pagination">
                        <button class="btn-process" id="prevBtn" onclick="showPrevious()">← Previous</button>
                        <div class="pagination-info">
                            <span id="currentPage">0</span> / <span id="totalPages">0</span>
                        </div>
                        <button class="btn-process" id="nextBtn" onclick="showNext()">Next →</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let results = [];
        let currentIndex = 0;
        let isProcessing = false;
        let abortControllers = [];

        function log(msg) {
            const debugLog = document.getElementById('debugLog');
            debugLog.style.display = 'block';
            const timestamp = new Date().toLocaleTimeString();
            debugLog.innerHTML += `[${timestamp}] ${msg}<br>`;
            debugLog.scrollTop = debugLog.scrollHeight;
        }

        function clearLog() {
            document.getElementById('debugLog').innerHTML = '';
            document.getElementById('debugLog').style.display = 'none';
        }

        function extractUrlsFromPaste(text) {
            const urls = [];
            const htmlParser = new DOMParser();
            
            try {
                const doc = htmlParser.parseFromString(text, 'text/html');
                const links = doc.querySelectorAll('a');
                if (links.length > 0) {
                    links.forEach(link => {
                        const href = link.getAttribute('href');
                        if (href && href.trim().length > 0) {
                            urls.push(href.trim());
                        }
                    });
                    if (urls.length > 0) return urls;
                }
            } catch (e) {}

            const urlRegex = /(https?:\/\/[^\s]+)/gi;
            const matches = text.match(urlRegex);
            if (matches) {
                return matches.map(url => url.trim().replace(/[\[\]]/g, ''));
            }

            return text.split('\n').filter(line => {
                const trimmed = line.trim().replace(/[\[\]]/g, '');
                return trimmed.length > 0 && (trimmed.startsWith('http://') || trimmed.startsWith('https://'));
            });
        }

        function extractUrl(url) {
            const archiveMatch = url.match(/web\.archive\.org\/web\/\d+\/(.*)/);
            if (archiveMatch) {
                return decodeURIComponent(archiveMatch[1]);
            }
            return url.trim();
        }

        function detectImageUrls(html) {
            const imageUrls = new Set();

            // Pattern 1: Extract all URLs from the content
            const urlRegex = /(https?:\/\/[^\s"'<>{}|\\^`\[\]]*)/gi;
            const urls = html.match(urlRegex) || [];

            urls.forEach(url => {
                // Check if URL looks like an image
                const lowerUrl = url.toLowerCase();
                
                // Image file extensions
                if (/(\.jpg|\.jpeg|\.png|\.gif|\.webp|\.svg|\.bmp|\.tiff)(\?|&|$)/i.test(url)) {
                    imageUrls.add(url);
                }
                // Media domains (Twitter/X, Instagram, Imgur, etc.)
                else if (/pbs\.twimg\.com|cdninstagram|imgur\.com|media|image|img/i.test(url)) {
                    if (!url.includes('platform') && !url.includes('static')) {
                        imageUrls.add(url);
                    }
                }
            });

            // Pattern 2: Look for img tags
            const imgRegex = /<img[^>]*src=["']([^"']+)["'][^>]*>/gi;
            let imgMatch;
            while ((imgMatch = imgRegex.exec(html)) !== null) {
                if (imgMatch[1]) imageUrls.add(imgMatch[1]);
            }

            // Pattern 3: Look for picture/source tags
            const srcsetRegex = /srcset=["']([^"']+)["']/gi;
            let srcsetMatch;
            while ((srcsetMatch = srcsetRegex.exec(html)) !== null) {
                if (srcsetMatch[1]) imageUrls.add(srcsetMatch[1]);
            }

            // Pattern 4: Look for background images
            const bgRegex = /background(?:-image)?:\s*url\(['"]?([^'")\s]+)['"]?\)/gi;
            let bgMatch;
            while ((bgMatch = bgRegex.exec(html)) !== null) {
                if (bgMatch[1]) imageUrls.add(bgMatch[1]);
            }

            // Pattern 5: Look for data URLs in JSON-like structures
            const jsonImageRegex = /["'](?:image|media|url|src|href)["']\s*:\s*["']([^"']+\.(jpg|jpeg|png|gif|webp|svg))["']/gi;
            let jsonMatch;
            while ((jsonMatch = jsonImageRegex.exec(html)) !== null) {
                if (jsonMatch[1]) imageUrls.add(jsonMatch[1]);
            }

            return Array.from(imageUrls);
        }

        function hasImages(html) {
            const imageUrls = detectImageUrls(html);
            return {
                found: imageUrls.length > 0,
                count: imageUrls.length,
                urls: imageUrls
            };
        }

        function stopProcessing() {
            isProcessing = false;
            abortControllers.forEach(ctrl => ctrl.abort());
            abortControllers = [];
            log('Processing stopped by user');
            document.getElementById('processBtn').disabled = false;
            document.getElementById('stopBtn').disabled = true;
            document.getElementById('stopBtn').style.display = 'none';
            document.getElementById('status').textContent = 'Stopped';
        }

        async function processUrls() {
            const input = document.getElementById('urlInput').value;
            const messageDiv = document.getElementById('message');
            const processBtn = document.getElementById('processBtn');
            const stopBtn = document.getElementById('stopBtn');

            if (!input.trim()) {
                messageDiv.innerHTML = '<div class="message error-message">❌ Please paste at least one URL</div>';
                return;
            }

            clearLog();
            messageDiv.innerHTML = '<div class="message info-message"><div class="loading"><div class="spinner"></div> Processing...</div></div>';
            processBtn.disabled = true;
            stopBtn.disabled = false;
            stopBtn.style.display = 'inline-block';

            let urls = extractUrlsFromPaste(input);
            log(`Extracted ${urls.length} URLs`);

            if (urls.length === 0) {
                messageDiv.innerHTML = '<div class="message error-message">❌ No valid URLs found.</div>';
                processBtn.disabled = false;
                stopBtn.disabled = true;
                stopBtn.style.display = 'none';
                return;
            }

            document.getElementById('urlCount').textContent = urls.length;
            document.getElementById('status').textContent = 'Processing...';

            results = [];
            let failedCount = 0;
            isProcessing = true;

            for (let i = 0; i < urls.length && results.length < 50 && isProcessing; i++) {
                try {
                    const url = extractUrl(urls[i]);
                    log(`[${i + 1}/${urls.length}] Fetching: ${url.substring(0, 60)}...`);

                    const controller = new AbortController();
                    abortControllers.push(controller);
                    const timeoutId = setTimeout(() => controller.abort(), 15000);

                    const response = await fetch(url, {
                        signal: controller.signal,
                        mode: 'cors',
                        headers: {
                            'User-Agent': 'Mozilla/5.0'
                        }
                    });

                    clearTimeout(timeoutId);

                    if (!response.ok) {
                        log(`  ✗ HTTP ${response.status}`);
                        failedCount++;
                        continue;
                    }

                    const contentType = response.headers.get('content-type') || 'text/html';
                    let content;

                    if (contentType.includes('application/json')) {
                        content = JSON.stringify(await response.json(), null, 2);
                    } else {
                        content = await response.text();
                    }

                    const imageCheck = hasImages(content);
                    log(`  Images: ${imageCheck.count} URL(s) found`);

                    if (imageCheck.found) {
                        results.push({
                            url: url,
                            content: content,
                            imageCount: imageCheck.count,
                            imageUrls: imageCheck.urls,
                            contentType: contentType,
                            timestamp: new Date().toLocaleString()
                        });
                        log(`  ✓ Match! (${results.length}/${Math.min(50, urls.length)})`);
                    } else {
                        log(`  ✗ No images detected`);
                    }
                } catch (error) {
                    log(`  ✗ Error: ${error.message}`);
                    failedCount++;
                }
            }

            document.getElementById('failedCount').textContent = failedCount;
            document.getElementById('validCount').textContent = results.length;
            document.getElementById('totalPages').textContent = results.length;

            if (results.length > 0) {
                currentIndex = 0;
                displayResult(0);
                messageDiv.innerHTML = `<div class="message success-message">✓ Found ${results.length} page${results.length !== 1 ? 's' : ''} with images (processed ${urls.length} URLs)</div>`;
                document.getElementById('status').textContent = 'Complete';
            } else {
                messageDiv.innerHTML = '<div class="message error-message">❌ No pages with images found.</div>';
                document.getElementById('status').textContent = 'No results';
                clearDisplay();
            }

            processBtn.disabled = false;
            stopBtn.disabled = true;
            stopBtn.style.display = 'none';
            isProcessing = false;
            log('Processing complete');
        }

        function displayResult(index) {
            if (index < 0 || index >= results.length) return;

            const result = results[index];
            const frame = document.getElementById('pageFrame');
            
            frame.srcdoc = result.content;
            
            document.getElementById('pageUrl').textContent = result.url;
            document.getElementById('imageCount').textContent = result.imageCount;
            document.getElementById('contentType').textContent = result.contentType.split(';')[0];
            document.getElementById('currentPage').textContent = index + 1;

            document.getElementById('prevBtn').disabled = index === 0;
            document.getElementById('nextBtn').disabled = index === results.length - 1;

            currentIndex = index;
        }

        function showNext() {
            if (currentIndex < results.length - 1) {
                displayResult(currentIndex + 1);
            }
        }

        function showPrevious() {
            if (currentIndex > 0) {
                displayResult(currentIndex - 1);
            }
        }

        function clearInput() {
            document.getElementById('urlInput').value = '';
            document.getElementById('message').innerHTML = '';
            clearLog();
            results = [];
            currentIndex = 0;
            clearDisplay();
            document.getElementById('urlCount').textContent = '0';
            document.getElementById('validCount').textContent = '0';
            document.getElementById('failedCount').textContent = '0';
            document.getElementById('status').textContent = 'Ready';
        }

        function clearDisplay() {
            document.getElementById('pageFrame').srcdoc = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#999;"><p>No pages to display</p></div>';
            document.getElementById('pageUrl').textContent = '-';
            document.getElementById('imageCount').textContent = '0';
            document.getElementById('contentType').textContent = '-';
            document.getElementById('currentPage').textContent = '0';
            document.getElementById('totalPages').textContent = '0';
            document.getElementById('prevBtn').disabled = true;
            document.getElementById('nextBtn').disabled = true;
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') showPrevious();
            if (e.key === 'ArrowRight') showNext();
        });

        document.getElementById('urlInput').addEventListener('paste', (e) => {
            e.preventDefault();
            const items = e.clipboardData.items;
            let html = '';
            let text = '';

            for (let i = 0; i < items.length; i++) {
                if (items[i].type.indexOf('text/html') !== -1) {
                    html = e.clipboardData.getData('text/html');
                } else if (items[i].type.indexOf('text/plain') !== -1) {
                    text = e.clipboardData.getData('text/plain');
                }
            }

            const content = html || text;
            const urls = extractUrlsFromPaste(content);

            if (urls.length > 0) {
                document.getElementById('urlInput').value = urls.join('\n');
                document.getElementById('message').innerHTML = `<div class="message info-message">✓ Extracted ${urls.length} URL${urls.length !== 1 ? 's' : ''}</div>`;
            }
        });
    </script>
</body>
</html>
