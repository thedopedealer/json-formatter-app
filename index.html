<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Detector - URL Parser</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 90vh;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            margin-bottom: 10px;
            font-size: 28px;
        }

        .header p {
            opacity: 0.9;
            font-size: 14px;
        }

        .content {
            display: flex;
            flex-direction: column;
            flex: 1;
            overflow: hidden;
        }

        .input-section {
            background: #f8f9fa;
            padding: 20px;
            border-bottom: 2px solid #e0e0e0;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .input-section h2 {
            font-size: 16px;
            color: #333;
        }

        .input-section label {
            display: block;
            font-size: 12px;
            color: #666;
        }

        textarea {
            width: 100%;
            height: 120px;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            resize: vertical;
        }

        textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .controls {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        .button-group {
            display: flex;
            gap: 8px;
        }

        button {
            padding: 12px 20px;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
        }

        .btn-process {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-process:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(102, 126, 234, 0.3);
        }

        .btn-process:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-clear {
            background: #f5f5f5;
            color: #333;
        }

        .btn-clear:hover {
            background: #efefef;
        }

        .stats {
            display: flex;
            gap: 20px;
            font-size: 13px;
            color: #666;
            flex-wrap: wrap;
        }

        .stats-item {
            background: white;
            padding: 8px 12px;
            border-radius: 4px;
            border-left: 3px solid #667eea;
        }

        .stats-item strong {
            color: #333;
        }

        .main-content {
            display: flex;
            flex: 1;
            overflow: hidden;
            gap: 16px;
            padding: 16px;
        }

        .display-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .display-panel h2 {
            font-size: 16px;
            margin-bottom: 12px;
            color: #333;
        }

        .page-viewer {
            flex: 1;
            background: white;
            border: 1px solid #ddd;
            border-radius: 6px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .page-viewer iframe {
            flex: 1;
            border: none;
            width: 100%;
        }

        .page-info {
            background: #f8f9fa;
            padding: 12px;
            border-top: 1px solid #ddd;
            font-size: 12px;
            color: #666;
            max-height: 100px;
            overflow-y: auto;
        }

        .page-info strong {
            color: #333;
        }

        .page-info-item {
            margin: 4px 0;
            word-break: break-all;
        }

        .pagination {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 12px;
            gap: 12px;
        }

        .pagination button {
            padding: 8px 16px;
            font-size: 13px;
            flex: 0 1 120px;
        }

        .pagination-info {
            text-align: center;
            font-size: 13px;
            color: #666;
            flex: 1;
        }

        .empty-state {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #999;
            text-align: center;
            flex-direction: column;
        }

        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: #666;
        }

        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .message {
            margin-top: 8px;
            padding: 12px;
            border-radius: 6px;
            font-size: 13px;
        }

        .error-message {
            background: #fee;
            color: #c33;
            border-left: 4px solid #c33;
        }

        .success-message {
            background: #efe;
            color: #3c3;
            border-left: 4px solid #3c3;
        }

        .info-message {
            background: #eef;
            color: #33c;
            border-left: 4px solid #33c;
        }

        @media (max-width: 768px) {
            .container {
                height: auto;
            }

            textarea {
                height: 100px;
            }

            .controls {
                flex-direction: column;
            }

            .button-group {
                width: 100%;
            }

            .stats {
                flex-direction: column;
            }

            .main-content {
                flex-direction: column;
                padding: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🖼️ Image Detector</h1>
            <p>Parse URLs (HTML or JSON), detect images, and display matching pages (up to 50 results)</p>
        </div>

        <div class="content">
            <div class="input-section">
                <h2>Input URLs</h2>
                <label>Paste your URL list (one per line). Supports plain URLs, hyperlinks, and web.archive.org links:</label>
                <textarea id="urlInput" placeholder="Paste URLs or hyperlinks here..."></textarea>

                <div class="controls">
                    <div class="button-group">
                        <button class="btn-process" id="processBtn" onclick="processUrls()">⚡ Process URLs</button>
                        <button class="btn-clear" onclick="clearInput()">🗑️ Clear</button>
                    </div>
                    <div class="stats">
                        <div class="stats-item"><strong>URLs:</strong> <span id="urlCount">0</span></div>
                        <div class="stats-item"><strong>Found:</strong> <span id="validCount">0</span></div>
                        <div class="stats-item"><strong>Failed:</strong> <span id="failedCount">0</span></div>
                        <div class="stats-item"><strong>Status:</strong> <span id="status">Ready</span></div>
                    </div>
                </div>

                <div id="message"></div>
            </div>

            <div class="main-content">
                <div class="display-panel">
                    <h2>Page Preview</h2>
                    <div class="page-viewer">
                        <iframe id="pageFrame"></iframe>
                        <div class="page-info">
                            <div class="page-info-item"><strong>URL:</strong> <span id="pageUrl">-</span></div>
                            <div class="page-info-item"><strong>Images Found:</strong> <span id="imageCount">0</span></div>
                        </div>
                    </div>

                    <div class="pagination">
                        <button class="btn-process" id="prevBtn" onclick="showPrevious()">← Previous</button>
                        <div class="pagination-info">
                            <span id="currentPage">0</span> / <span id="totalPages">0</span>
                        </div>
                        <button class="btn-process" id="nextBtn" onclick="showNext()">Next →</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let results = [];
        let currentIndex = 0;

        function extractUrlsFromPaste(text) {
            const urls = [];
            const htmlParser = new DOMParser();
            
            try {
                const doc = htmlParser.parseFromString(text, 'text/html');
                const links = doc.querySelectorAll('a');
                if (links.length > 0) {
                    links.forEach(link => {
                        const href = link.getAttribute('href');
                        if (href && href.trim().length > 0) {
                            urls.push(href.trim());
                        }
                    });
                    if (urls.length > 0) return urls;
                }
            } catch (e) {}

            const urlRegex = /(https?:\/\/[^\s]+)/gi;
            const matches = text.match(urlRegex);
            if (matches) {
                return matches.map(url => url.trim());
            }

            return text.split('\n').filter(line => {
                const trimmed = line.trim();
                return trimmed.length > 0 && (trimmed.startsWith('http://') || trimmed.startsWith('https://'));
            });
        }

        function extractUrl(url) {
            const archiveMatch = url.match(/web\.archive\.org\/web\/\d+\/(.*)/);
            if (archiveMatch) {
                return decodeURIComponent(archiveMatch[1]);
            }
            return url.trim();
        }

        function hasImages(html) {
            // Check for img tags
            const imgRegex = /<img[^>]*src=["']([^"']+)["'][^>]*>/gi;
            const imgMatches = html.match(imgRegex);
            if (imgMatches && imgMatches.length > 0) {
                return { found: true, count: imgMatches.length };
            }

            // Check for image URLs in JSON
            try {
                const data = JSON.parse(html);
                let imageCount = 0;
                
                const searchForImages = (obj) => {
                    if (Array.isArray(obj)) {
                        obj.forEach(item => imageCount += searchForImages(item));
                    } else if (obj && typeof obj === 'object') {
                        Object.values(obj).forEach(value => imageCount += searchForImages(value));
                    } else if (typeof obj === 'string') {
                        if (/(\.jpg|\.jpeg|\.png|\.gif|\.webp|\.svg)(\?[^"']*)?$/i.test(obj) || /\.(jpg|jpeg|png|gif|webp|svg)/i.test(obj)) {
                            imageCount++;
                        }
                    }
                    return imageCount > 0 ? 1 : 0;
                };
                
                const count = searchForImages(data);
                return { found: count > 0, count: count };
            } catch (e) {}

            return { found: false, count: 0 };
        }

        async function processUrls() {
            const input = document.getElementById('urlInput').value;
            const messageDiv = document.getElementById('message');
            const processBtn = document.getElementById('processBtn');

            if (!input.trim()) {
                messageDiv.innerHTML = '<div class="message error-message">❌ Please paste at least one URL</div>';
                return;
            }

            messageDiv.innerHTML = '<div class="message info-message"><div class="loading"><div class="spinner"></div> Processing...</div></div>';
            processBtn.disabled = true;

            let urls = extractUrlsFromPaste(input);

            if (urls.length === 0) {
                messageDiv.innerHTML = '<div class="message error-message">❌ No valid URLs found.</div>';
                processBtn.disabled = false;
                return;
            }

            document.getElementById('urlCount').textContent = urls.length;
            document.getElementById('status').textContent = 'Processing...';

            results = [];
            let failedCount = 0;

            for (let i = 0; i < urls.length && results.length < 50; i++) {
                try {
                    const url = extractUrl(urls[i]);
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), 10000);

                    const response = await fetch(url, {
                        signal: controller.signal,
                        mode: 'cors'
                    });

                    clearTimeout(timeoutId);

                    if (!response.ok) {
                        failedCount++;
                        continue;
                    }

                    const contentType = response.headers.get('content-type');
                    let content;

                    if (contentType && contentType.includes('application/json')) {
                        content = JSON.stringify(await response.json(), null, 2);
                    } else {
                        content = await response.text();
                    }

                    const imageCheck = hasImages(content);

                    if (imageCheck.found) {
                        results.push({
                            url: url,
                            content: content,
                            imageCount: imageCheck.count,
                            timestamp: new Date().toLocaleString()
                        });
                    }
                } catch (error) {
                    failedCount++;
                }
            }

            document.getElementById('failedCount').textContent = failedCount;
            document.getElementById('validCount').textContent = results.length;
            document.getElementById('totalPages').textContent = results.length;

            if (results.length > 0) {
                currentIndex = 0;
                displayResult(0);
                messageDiv.innerHTML = `<div class="message success-message">✓ Found ${results.length} page${results.length !== 1 ? 's' : ''} with images</div>`;
                document.getElementById('status').textContent = 'Complete';
            } else {
                messageDiv.innerHTML = '<div class="message error-message">❌ No pages with images found.</div>';
                document.getElementById('status').textContent = 'No results';
                clearDisplay();
            }

            processBtn.disabled = false;
        }

        function displayResult(index) {
            if (index < 0 || index >= results.length) return;

            const result = results[index];
            const frame = document.getElementById('pageFrame');
            
            frame.srcdoc = result.content;
            
            document.getElementById('pageUrl').textContent = result.url;
            document.getElementById('imageCount').textContent = result.imageCount;
            document.getElementById('currentPage').textContent = index + 1;

            document.getElementById('prevBtn').disabled = index === 0;
            document.getElementById('nextBtn').disabled = index === results.length - 1;

            currentIndex = index;
        }

        function showNext() {
            if (currentIndex < results.length - 1) {
                displayResult(currentIndex + 1);
            }
        }

        function showPrevious() {
            if (currentIndex > 0) {
                displayResult(currentIndex - 1);
            }
        }

        function clearInput() {
            document.getElementById('urlInput').value = '';
            document.getElementById('message').innerHTML = '';
            results = [];
            currentIndex = 0;
            clearDisplay();
            document.getElementById('urlCount').textContent = '0';
            document.getElementById('validCount').textContent = '0';
            document.getElementById('failedCount').textContent = '0';
            document.getElementById('status').textContent = 'Ready';
        }

        function clearDisplay() {
            document.getElementById('pageFrame').srcdoc = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#999;"><p>No pages to display</p></div>';
            document.getElementById('pageUrl').textContent = '-';
            document.getElementById('imageCount').textContent = '0';
            document.getElementById('currentPage').textContent = '0';
            document.getElementById('totalPages').textContent = '0';
            document.getElementById('prevBtn').disabled = true;
            document.getElementById('nextBtn').disabled = true;
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') showPrevious();
            if (e.key === 'ArrowRight') showNext();
        });

        document.getElementById('urlInput').addEventListener('paste', (e) => {
            e.preventDefault();
            const items = e.clipboardData.items;
            let html = '';
            let text = '';

            for (let i = 0; i < items.length; i++) {
                if (items[i].type.indexOf('text/html') !== -1) {
                    html = e.clipboardData.getData('text/html');
                } else if (items[i].type.indexOf('text/plain') !== -1) {
                    text = e.clipboardData.getData('text/plain');
                }
            }

            const content = html || text;
            const urls = extractUrlsFromPaste(content);

            if (urls.length > 0) {
                document.getElementById('urlInput').value = urls.join('\n');
                document.getElementById('message').innerHTML = `<div class="message info-message">✓ Extracted ${urls.length} URL${urls.length !== 1 ? 's' : ''}</div>`;
            }
        });
    </script>
</body>
</html>
